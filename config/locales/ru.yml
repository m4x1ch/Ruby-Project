    contacts_text: "Разработчик проекта: Студент Силин Максим, группф 5140903/50401, по вопросам проекта можете обращаться по адресу silin.ms@edu.spbstu.ru"
    about_title: "О проекте"
    about_text: "Experteese — это WEB-приложение, разработанное на Ruby on Rails в рамках курсового проекта по дисциплине «Методики разработки современных WEB-приложений». Основная задача приложения — предоставить пользователю удобный интерфейс для просмотра и оценивая различных видов сыров с поддержкой мультиязычного интерфейса."
