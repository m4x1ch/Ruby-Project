    help_title: "Страница помощи"
    help_text: "Данное приложение предназначено для ознакомления с различными видами сыров, их категориями и особенностями. Пользователь может просматривать категории сыров, изучать изображения сыров, оценивать их, переключать язык интерфейса, создавать личный аккаунт и авторизовываться в системе. Для навигации используйте меню в верхней части сайта."
